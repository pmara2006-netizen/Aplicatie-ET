<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Electrotehnică - Dark Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19; /* Fundal ultra-dark cu tentă albastră */
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #app {
            background: #161f30; /* Albastru închis premium */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 700px;
            box-sizing: border-box;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #233554; /* Border subtil */
        }
        h1 {
            text-align: center;
            color: #38bdf8; /* Albastru cyan electric */
            margin-top: 0;
            font-size: 1.8em;
            letter-spacing: 0.5px;
        }
        .question {
            font-size: 1.2em;
            margin-bottom: 25px;
            font-weight: bold;
            color: #f1f5f9;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button.option-btn {
            background-color: #1e293b; /* Butoane gri-albăstrui închise */
            border: 2px solid #334155;
            padding: 14px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            color: #cbd5e1;
        }
        button.option-btn:hover:not(:disabled) {
            background-color: #233554;
            border-color: #38bdf8;
            color: #ffffff;
        }
        button.option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        .correct {
            background-color: #064e3b !important; /* Verde închis neon */
            border-color: #10b981 !important;
            color: #ecfdf5 !important;
            font-weight: bold;
        }
        .wrong {
            background-color: #7f1d1d !important; /* Roșu închis burgund */
            border-color: #ef4444 !important;
            color: #fef2f2 !important;
        }
        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #0f172a;
            border-left: 5px solid #38bdf8;
            border-radius: 4px;
            display: none;
            font-size: 0.95em;
            color: #94a3b8;
            line-height: 1.5;
        }
        #next-btn, #restart-btn {
            margin-top: 25px;
            padding: 14px 20px;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: none;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #next-btn:hover, #restart-btn:hover {
            background-color: #0369a1;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: #64748b;
            font-size: 0.95em;
            border-bottom: 1px solid #233554;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="app">
    <h1>Quiz Electrotehnică</h1>
    <div class="stats">
        <span id="progress">Întrebarea: 1/50</span>
        <span id="score-display">Scor: 0</span>
    </div>
    <div id="quiz-container">
        <div id="question" class="question">Se încarcă întrebarea...</div>
        <div id="options" class="options"></div>
        <div id="explanation" class="explanation"></div>
        <button id="next-btn" onclick="nextQuestion()">Următoarea Întrebare</button>
    </div>
    <div id="result-container" style="display: none; text-align: center;">
        <h2>Quiz Finalizat!</h2>
        <p id="final-score" style="font-size: 1.5em; font-weight: bold; color: #38bdf8;"></p>
        <button id="restart-btn" style="display: inline-block;" onclick="startQuiz()">Repornește Quiz-ul</button>
    </div>
</div>

        }
    ];

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function startQuiz() {
        currentQuestions = shuffleArray([...rawQuestions]);
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('result-container').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        updateStats();
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('explanation').style.display = 'none';
        
        const qObj = currentQuestions[currentQuestionIndex];
        document.getElementById('question').innerText = qObj.q;

        const shuffledOpts = shuffleArray([...qObj.opts]);
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        shuffledOpts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.t;
            btn.onclick = () => checkAnswer(opt, btn, shuffledOpts);
            optionsContainer.appendChild(btn);
        });

        updateStats();
    }

    function checkAnswer(selectedOpt, selectedBtn, allOptsData) {
        if (answered) return;
        answered = true;

        const allBtns = document.querySelectorAll('.option-btn');
        const qObj = currentQuestions[currentQuestionIndex];

        allBtns.forEach((btn, index) => {
            btn.disabled = true;
            const optData = allOptsData[index];
            if (optData.c) {
                btn.classList.add('correct');
            } else if (btn === selectedBtn && !optData.c) {
                btn.classList.add('wrong');
            }
        });

        const explanationDiv = document.getElementById('explanation');
        
        if (selectedOpt.c) {
            score++;
            explanationDiv.innerHTML = "<strong>Corect!</strong> " + qObj.exp;
            explanationDiv.style.borderLeftColor = "#10b981";
        } else {
            explanationDiv.innerHTML = "<strong>Incorect.</strong> " + qObj.exp;
            explanationDiv.style.borderLeftColor = "#ef4444";
        }
        
        explanationDiv.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
        updateStats();
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function updateStats() {
        const progressStr = `Întrebarea: ${Math.min(currentQuestionIndex + 1, currentQuestions.length)}/${currentQuestions.length}`;
        document.getElementById('progress').innerText = progressStr;
        document.getElementById('score-display').innerText = `Scor: ${score}`;
    }

    function showResults() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';
        
        const percentage = Math.round((score / currentQuestions.length) * 100);
        document.getElementById('final-score').innerText = `Ai obținut ${score} puncte din ${currentQuestions.length} (${percentage}%)`;
    }

    window.onload = startQuiz;
</script>
</body>
</html>
