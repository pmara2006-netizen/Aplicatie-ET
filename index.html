<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrotechnics Exam Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b1121;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0284c7;
            --correct: #10b981;
            --wrong: #ef4444;
            --skipped: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            
            /* Source Badge Colors */
            --src-orig-bg: rgba(168, 85, 247, 0.15);
            --src-orig-text: #c084fc;
            --src-orig-border: #a855f7;
            
            --src-gen-bg: rgba(56, 189, 248, 0.15);
            --src-gen-text: #7dd3fc;
            --src-gen-border: #38bdf8;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        /* --- SCREENS --- */
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- CARDS --- */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 { margin-top: 0; color: #ffffff; font-weight: 600; font-size: 2rem; }
        p.subtitle { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }

        /* --- BUTTONS --- */
        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--primary);
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }
        .btn-primary:hover { background: #7dd3fc; transform: translateY(-2px); }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .btn-outline:hover { border-color: var(--text-main); color: var(--text-main); }

        /* --- HEADER & BADGES --- */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        .stats { font-weight: 500; color: var(--text-muted); font-size: 0.95rem; }
        
        .source-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid;
        }
        .source-badge.original {
            background: var(--src-orig-bg);
            color: var(--src-orig-text);
            border-color: var(--src-orig-border);
        }
        .source-badge.generated {
            background: var(--src-gen-bg);
            color: var(--src-gen-text);
            border-color: var(--src-gen-border);
        }

        /* --- QUESTION & OPTIONS --- */
        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 30px;
            line-height: 1.5;
            color: #ffffff;
        }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        
        .option-item {
            padding: 18px 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-main);
        }
        .option-item:hover:not(.disabled) {
            border-color: var(--primary);
            background: rgba(56, 189, 248, 0.05);
        }
        .option-item.disabled { cursor: default; }

        .opt-letter {
            background: var(--border);
            color: var(--text-main);
            border-radius: 8px;
            width: 30px; height: 30px;
            display: flex; justify-content: center; align-items: center;
            font-weight: 700; font-size: 0.9rem;
            flex-shrink: 0;
        }

        /* Answer States */
        .option-item.correct { border-color: var(--correct); background: rgba(16, 185, 129, 0.1); }
        .option-item.correct .opt-letter { background: var(--correct); color: white; }
        
        .option-item.wrong { border-color: var(--wrong); background: rgba(239, 68, 68, 0.1); }
        .option-item.wrong .opt-letter { background: var(--wrong); color: white; }
        
        .option-item.faded { opacity: 0.3; }

        /* --- EXPLANATION --- */
        .explanation-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            background: rgba(0,0,0,0.2);
            border-left: 4px solid var(--border);
            display: none;
            line-height: 1.6;
        }
        .explanation-box p { margin: 0; color: var(--text-muted); font-size: 0.95rem; }
        .status-title { font-weight: 700; margin-bottom: 8px; display: block; font-size: 1.1rem; }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        /* --- SUMMARY --- */
        .summary-list {
            max-height: 50vh;
            overflow-y: auto;
            margin: 30px 0;
            text-align: left;
            padding-right: 10px;
        }
        .summary-list::-webkit-scrollbar { width: 6px; }
        .summary-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .sum-item {
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.1);
            border-left-width: 4px;
        }
        .sum-item.correct { border-left-color: var(--correct); }
        .sum-item.wrong { border-left-color: var(--wrong); }
        .sum-item.skipped { border-left-color: var(--skipped); }

        .sum-q { font-weight: 600; margin-bottom: 8px; font-size: 1rem; }
        .sum-a { font-size: 0.9rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="screen-start" class="screen active card" style="text-align: center;">
            <h1>Electrotechnics Exam</h1>
            <p class="subtitle">50 Randomized Questions.<br>Includes original test questions and newly generated ones from course notes.</p>
            <button class="btn btn-primary" onclick="startExam()">Start Learning</button>
        </div>

        <div id="screen-exam" class="screen card">
            <div class="quiz-header">
                <div class="stats">
                    <span id="progress-text">Question 1 of 50</span> • 
                    <span id="score-text">Score: 0</span>
                </div>
                <div id="source-indicator"></div>
            </div>

            <div class="question-text" id="question-text">Loading...</div>
            <div class="options-list" id="options-list"></div>
            <div class="explanation-box" id="explanation-box"></div>

            <div class="controls">
                <button class="btn btn-outline" id="btn-skip" onclick="skipQuestion()">I don't know (Skip)</button>
                <button class="btn btn-primary" id="btn-next" style="display: none;" onclick="nextQuestion()">Next Question</button>
            </div>
        </div>

        <div id="screen-results" class="screen card" style="text-align: center;">
            <h1>Exam Completed!</h1>
            <div id="final-score" style="font-size: 3rem; font-weight: 700; color: var(--primary); margin: 20px 0;">0 / 50</div>
            
            <div class="summary-list" id="summary-list">
                </div>

            <button class="btn btn-primary" onclick="location.reload()">Restart Exam</button>
        </div>

    </div>

<script>
    // Database of 50 Questions with SOURCE tags
    const rawQuestions = [
        // --- 20 ORIGINAL QUESTIONS ---
        { source: 'original', q: "Ohm's Law is expressed as:", opts: [{t: "R = u * i + e", c: false}, {t: "R * i = u * G + e", c: false}, {t: "R * i = u + e", c: true}, {t: "R * l = u + e", c: false}], exp: "Ohm's law for a circuit branch with an electromotive force (e) is given by R * i = u + e." },
        { source: 'original', q: "The general form of the Electromagnetic Induction Law (Faraday's Law) is:", opts: [{t: "the magnetomotive voltage produced is equal to the decrease speed of magnetic flux through any surface supported on the curve", c: false}, {t: "electromotive voltage is decrease of the magnetic flux through a surface", c: false}, {t: "the electromotive voltage, e, produced through electromagnetic induction along the closed curve is equal with the decrease speed of the magnetic flux through any surface supported on the curve", c: true}, {t: "the voltage is produced through induction along a permanent magnet closed in a curve", c: false}], exp: "Faraday's law states that the induced electromotive voltage equals the rate of decrease of the magnetic flux through the surface supported by the closed loop." },
        { source: 'original', q: "The parameter Z is:", opts: [{t: "the complex conductance", c: false}, {t: "the complex susceptance", c: false}, {t: "the complex impedance", c: true}, {t: "the complex admittance", c: false}], exp: "Z represents complex impedance, which is the total opposition a circuit presents to alternating current." },
        { source: 'original', q: "The equivalent capacitance of two capacitors connected in series having the capacitances C1 and C2 is:", opts: [{t: "C_e = C_1 + C_2", c: false}, {t: "C_e = (C_1 + C_2) / (C_1 * C_2)", c: false}, {t: "C_e = C_1 * C_2", c: false}, {t: "C_e = (C_1 * C_2) / (C_1 + C_2)", c: true}], exp: "For capacitors in series, the equivalent capacitance is the product over the sum: (C_1 * C_2) / (C_1 + C_2)." },
        { source: 'original', q: "U_AB0 in Thevenin's Theorem is:", opts: [{t: "the voltage between A and B in open circuit between A and B", c: true}, {t: "the direct current voltage between A and B", c: false}, {t: "the voltage between A and B at short-circuit between A and B", c: false}, {t: "the alternating current voltage between A and B", c: false}], exp: "U_AB0 refers to the open-circuit voltage at the terminals A and B before a load is connected." },
        { source: 'original', q: "How can the phenomena encountered in the Theory of the Electromagnetic Field be classified:", opts: [{t: "charge, electric currents, and permanent magnets", c: false}, {t: "electric, magnetic, and electromagnetic", c: true}, {t: "electrification, magnetization or electro-kinetic", c: false}, {t: "friction; heating, and chemical", c: false}], exp: "The phenomena are classified into three distinct categories: electric (stationary charges), magnetic (stationary currents), and electromagnetic (time-variable currents)." },
        { source: 'original', q: "The resistors, inductors (coils) and capacitors are:", opts: [{t: "active elements of the circuit", c: false}, {t: "passive elements of the circuit", c: true}, {t: "sources of the circuit", c: false}, {t: "parameters of the circuit", c: false}], exp: "Resistors, inductors, and capacitors cannot generate energy continuously, making them passive elements." },
        { source: 'original', q: "The generalized impedance of a capacitor in the transient regime is:", opts: [{t: "Z = sC", c: false}, {t: "Z = 1 / sC", c: true}, {t: "Z = C / s", c: false}, {t: "Z = s^2*C", c: false}], exp: "In the Laplace domain (transient regime), the impedance of a capacitor is given by 1 / (s * C)." },
        { source: 'original', q: "The internal resistance of an ideal current source has the value equal with:", opts: [{t: "the source value", c: false}, {t: "infinite", c: true}, {t: "any value", c: false}, {t: "zero", c: false}], exp: "An ideal current source provides a constant current regardless of the load, which implies it has an infinite internal resistance." },
        { source: 'original', q: "In the R, L, C parallel electric circuit, at resonance:", opts: [{t: "the total current is minimal", c: true}, {t: "U_L = 0", c: false}, {t: "U_L = - U_C", c: false}, {t: "the active power is zero", c: false}], exp: "In a parallel RLC circuit at resonance, the total impedance is at its maximum (purely resistive), making the total current drawn from the source minimal." },
        { source: 'original', q: "The symbol E (vector) is:", opts: [{t: "electric field density", c: false}, {t: "electric field intensity", c: true}, {t: "electric charge intensity", c: false}, {t: "electric current intensity", c: false}], exp: "Vector E denotes the Electric Field Intensity, measured in Volts per meter (V/m)." },
        { source: 'original', q: "Which is the correct affirmation about the parallel equivalent resistance of 2 resistors:", opts: [{t: "1 / R_p = 1 / R_1 + 1 / R_2", c: true}, {t: "R_p = R_1 * R_2", c: false}, {t: "R_p = R_1 + R_2", c: false}, {t: "R_p = R_1 - R_2", c: false}], exp: "For parallel resistors, the reciprocal of the equivalent resistance is the sum of the reciprocals of the individual resistances." },
        { source: 'original', q: "The impedance parameters of a passive linear two ports network establishes:", opts: [{t: "the relations between the input and output quantities", c: false}, {t: "the relations between the voltages and the currents", c: true}, {t: "the symmetry conditions", c: false}, {t: "the relations between the currents and the voltages", c: false}], exp: "Impedance parameters specifically define the linear relationships connecting the voltages to the currents at the network's ports." },
        { source: 'original', q: "Which is the second commutation theorem (transient regime):", opts: [{t: "the integration constants are determined from the circuit's initial condition", c: false}, {t: "the voltage at the capacitor terminals can't vary through jump in the moment of commutation", c: false}, {t: "in the moment of commutation, the current through the inductors can't vary through a jump", c: true}, {t: "the transitory regime is passing from a permanent regime to another permanent regime", c: false}], exp: "The commutation theorems state that capacitor voltage and inductor current cannot change instantaneously. The second theorem refers to the inductor's current (or magnetic flux)." },
        { source: 'original', q: "The volume charge density is defined as:", opts: [{t: "p_s = q/A", c: false}, {t: "p_v = q/V", c: false}, {t: "p_v = dq/dS", c: false}, {t: "p_v = dq/dV", c: true}], exp: "Volume charge density (rho_v) is the limit of charge per unit volume as the volume approaches zero, represented as the derivative dq/dV." },
        { source: 'original', q: "The electrical conductance:", opts: [{t: "is the image of conductivity", c: false}, {t: "is the real part of the electric resistance", c: false}, {t: "is the inverse of the electric resistance", c: true}, {t: "is the conduction current", c: false}], exp: "Conductance (G) is the ease with which current flows, mathematically defined as the reciprocal of resistance (G = 1/R)." },
        { source: 'original', q: "The symbol H (vector) is:", opts: [{t: "magnetic field density", c: false}, {t: "magnetic field intensity", c: true}, {t: "magnet charge intensity", c: false}, {t: "magnetic current intensity", c: false}], exp: "Vector H represents the Magnetic Field Intensity, distinct from B which is the Magnetic Flux Density." },
        { source: 'original', q: "When we passivate an ideal voltage source, we replace it with:", opts: [{t: "short-circuit", c: true}, {t: "operational circuit", c: false}, {t: "open circuit", c: false}, {t: "its internal resistance", c: false}], exp: "To passivate an ideal voltage source in circuit analysis, it is replaced with a short circuit (0 Volts)." },
        { source: 'original', q: "For a quadripole what do A, B, C, D represent:", opts: [{t: "impedance parameters", c: false}, {t: "fundamental parameters", c: true}, {t: "admittance parameters", c: false}, {t: "internal parameters", c: false}], exp: "A, B, C, and D are known as the fundamental (or transmission) parameters of a two-port network." },
        { source: 'original', q: "The capacitive reactance, X_C, has the expression:", opts: [{t: "X_C = w * C", c: false}, {t: "X_C = 1 / (w * C)", c: true}, {t: "X_C = j * w * C", c: false}, {t: "none of the ones presented", c: false}], exp: "Capacitive reactance is calculated as 1 divided by the angular frequency (w) times the capacitance (C)." },

        // --- 30 GENERATED QUESTIONS (FROM COURSE NOTES) ---
        { source: 'generated', q: "According to Course 1, Electrotechnics covers two main parts. One is the Theory of Electric Circuits. What is the other?", opts: [{t: "The Theory of Thermodynamics", c: false}, {t: "The Theory of Electromagnetic Field", c: true}, {t: "The Theory of Solid State Physics", c: false}, {t: "The Theory of Digital Electronics", c: false}], exp: "Electrotechnics analyzes electric, magnetic and electromagnetic phenomena and covers two main parts: The Theory of Electromagnetic Field and The Theory of Electric Circuits." },
        { source: 'generated', q: "How can the state of electrification (charging a body) be achieved?", opts: [{t: "Only by friction", c: false}, {t: "Only by heating", c: false}, {t: "By friction, heating, chemical effects, crystal deformation, or irradiation", c: true}, {t: "By changing the atmospheric pressure", c: false}], exp: "Electrification can be achieved by friction, heating, chemical effects, crystal deformation, or irradiation (e.g., x-rays or ultraviolet)." },
        { source: 'generated', q: "What defines an insulator (dielectric) material?", opts: [{t: "It amplifies the flow of electric charges", c: false}, {t: "It allows the free flow of electric charges", c: false}, {t: "It reverses the direction of electric charges", c: false}, {t: "It doesn't allow the flow of electric charges", c: true}], exp: "An insulator doesn't allow the flow of electric charges. They are also called dielectrics." },
        { source: 'generated', q: "The electric field intensity (E) is measured in which units?", opts: [{t: "Farads (F)", c: false}, {t: "Newtons per Coulomb (N/C) or Volts per meter (V/m)", c: true}, {t: "Coulombs (C)", c: false}, {t: "Joules (J)", c: false}], exp: "Electric field intensity is measured in Volts per meter (V/m) or Newtons per Coulomb (N/C)." },
        { source: 'generated', q: "For a parallel plane capacitor, if 'A' is the area and 'd' is the distance between plates, the capacitance is:", opts: [{t: "C = (epsilon * d) / A", c: false}, {t: "C = (epsilon * A) / d", c: true}, {t: "C = epsilon * A * d", c: false}, {t: "C = A / (epsilon * d)", c: false}], exp: "The direct method calculation shows the capacitance of a plane capacitor is C = (epsilon * A) / d." },
        { source: 'generated', q: "When capacitors are connected in parallel, the total equivalent capacitance is:", opts: [{t: "The sum of their reciprocals", c: false}, {t: "The product of their capacitances", c: false}, {t: "The sum of their individual capacitances", c: true}, {t: "Calculated exactly like resistors in parallel", c: false}], exp: "For capacitors in parallel, the equivalent capacitance is C_e = C_1 + C_2 + ... + C_n." },
        { source: 'generated', q: "What is the relation between Electric Resistance (R) and Electric Conductance (G)?", opts: [{t: "G is the real part of R", c: false}, {t: "G is the reciprocal (inverse) of R", c: true}, {t: "G and R are measured in the same units", c: false}, {t: "G is the derivative of R with respect to time", c: false}], exp: "The reciprocal quantity of electric resistance is electric conductance (G = 1/R)." },
        { source: 'generated', q: "Based on the temporary magnetization law, materials with magnetic susceptibility (X_m) < 0 are called:", opts: [{t: "Paramagnetic materials", c: false}, {t: "Ferromagnetic materials", c: false}, {t: "Diamagnetic materials", c: true}, {t: "Linear materials", c: false}], exp: "Materials for which X_m < 0 are called diamagnetic materials." },
        { source: 'generated', q: "What defines a paramagnetic material?", opts: [{t: "X_m < 0", c: false}, {t: "X_m = 0", c: false}, {t: "X_m > 0", c: true}, {t: "It depends on the electric field", c: false}], exp: "Materials for which magnetic susceptibility X_m > 0 are called paramagnetic materials." },
        { source: 'generated', q: "Which passive electronic circuit component is used specifically to store magnetic energy?", opts: [{t: "Resistor", c: false}, {t: "Capacitor", c: false}, {t: "Inductor (Coil)", c: true}, {t: "Diode", c: false}], exp: "An inductor (coil) is a passive electric element used in circuits to store magnetic energy." },
        { source: 'generated', q: "According to Faraday's experiment, what happens if you move a permanent magnet inside a conductive loop?", opts: [{t: "It acts as a capacitor", c: false}, {t: "An electric current is induced", c: true}, {t: "The loop becomes perfectly resistive", c: false}, {t: "The magnetic field is destroyed", c: false}], exp: "Moving a permanent magnet inside a conductive loop changes the magnetic flux, inducing an electromotive voltage and an electric current." },
        { source: 'generated', q: "Electromotive voltage induced by Faraday's Law can be decomposed into two components:", opts: [{t: "Friction and Heating", c: false}, {t: "Movement and Transformation", c: true}, {t: "Active and Passive", c: false}, {t: "Electric and Magnetic", c: false}], exp: "The total induced electromotive voltage is the sum of the voltage induced through movement and the voltage induced through transformation." },
        { source: 'generated', q: "An active element of a circuit is defined as:", opts: [{t: "An element that dissipates energy as heat", c: false}, {t: "An element capable of generating energy", c: true}, {t: "An element that only stores magnetic energy", c: false}, {t: "An element that only opposes current", c: false}], exp: "An active element (like a voltage or current source) is capable of generating energy, while a passive element is not." },
        { source: 'generated', q: "In circuit topology, what is a 'node'?", opts: [{t: "An unbranched portion of a circuit", c: false}, {t: "Any closed path in a circuit", c: false}, {t: "An element that stores energy", c: false}, {t: "The point of connection between at least three branches", c: true}], exp: "A node is the point of connection between at least three branches." },
        { source: 'generated', q: "In circuit topology, a 'branch' is defined as:", opts: [{t: "A point where three wires meet", c: false}, {t: "Any closed path in a circuit", c: false}, {t: "An unbranched portion of a circuit formed of elements connected in series", c: true}, {t: "A network of parallel resistors", c: false}], exp: "A branch of a circuit is an unbranched portion of a circuit formed of elements connected in series with each other." },
        { source: 'generated', q: "What does Euler's Theorem calculate in circuit topology?", opts: [{t: "The total resistance", c: false}, {t: "The equivalent capacitance", c: false}, {t: "The number of independent loops (b = l - n + s)", c: true}, {t: "The total electromotive force", c: false}], exp: "Euler's Theorem (b = l - n + s) determines the exact number of independent loops based on branches (l), nodes (n), and sub-networks (s)." },
        { source: 'generated', q: "According to the principle of voltage division, if two resistors (R1, R2) are in series, the voltage U1 across R1 is:", opts: [{t: "U1 = U * R2 / (R1 + R2)", c: false}, {t: "U1 = U * R1 / (R1 + R2)", c: true}, {t: "U1 = U * (R1 + R2)", c: false}, {t: "U1 = U / R1", c: false}], exp: "Voltage division for a series circuit states that the voltage drop across a specific resistor is proportional to its resistance relative to the total resistance." },
        { source: 'generated', q: "According to the principle of current division, if two resistors (R1, R2) are in parallel, the current I1 through R1 is:", opts: [{t: "I1 = I * R1 / (R1 + R2)", c: false}, {t: "I1 = I * (R1 + R2)", c: false}, {t: "I1 = I * R2 / (R1 + R2)", c: true}, {t: "I1 = I / R1", c: false}], exp: "Current division for a parallel circuit states that the current through a branch is proportional to the resistance of the other branch over the total resistance." },
        { source: 'generated', q: "What principle is the First Kirchhoff Theorem (KCL) based on?", opts: [{t: "Conservation of Energy", c: false}, {t: "Conservation of Mass", c: false}, {t: "Conservation of Electric Charge", c: true}, {t: "Faraday's Law of Induction", c: false}], exp: "KCL (The sum of currents leaving a node is zero) is based on the Law of Electric Charge Conservation." },

    ];

    let questions = [];
    let currentIdx = 0;
    let score = 0;
    let answered = false;
    let userHistory = [];

    // Utility to switch screens
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Array Shuffler
    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    function startExam() {
        questions = shuffleArray([...rawQuestions]);
        currentIdx = 0;
        score = 0;
        userHistory = [];
        showScreen('screen-exam');
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        document.getElementById('btn-skip').style.display = 'block';
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('explanation-box').style.display = 'none';

        const q = questions[currentIdx];
        
        // Update Stats
        document.getElementById('progress-text').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
        document.getElementById('score-text').innerText = `Score: ${score}`;

        // Update Source Badge
        const badge = document.getElementById('source-indicator');
        if (q.source === 'original') {
            badge.innerHTML = `<span class="source-badge original">📁 Source: Original File</span>`;
        } else {
            badge.innerHTML = `<span class="source-badge generated">📝 Source: Generated (Course Notes)</span>`;
        }

        // Render Question
        document.getElementById('question-text').innerText = q.q;

        // Render Options
        if (!q.shuffledOpts) q.shuffledOpts = shuffleArray([...q.opts]);
        
        const optionsList = document.getElementById('options-list');
        optionsList.innerHTML = '';
        
        const letters = ['A', 'B', 'C', 'D'];

        q.shuffledOpts.forEach((opt, idx) => {
            const optEl = document.createElement('div');
            optEl.className = 'option-item';
            optEl.innerHTML = `
                <div class="opt-letter">${letters[idx]}</div>
                <div>${opt.t}</div>
            `;
            optEl.onclick = () => selectOption(idx, optEl);
            optionsList.appendChild(optEl);
        });
    }

    function selectOption(optIdx, selectedEl) {
        if (answered) return;
        answered = true;

        const q = questions[currentIdx];
        const selectedOpt = q.shuffledOpts[optIdx];
        const allOptionElements = document.querySelectorAll('.option-item');
        
        // Find correct text for history
        const correctText = q.opts.find(o => o.c).t;

        // Reveal answers visually
        allOptionElements.forEach((el, index) => {
            el.classList.add('disabled');
            const optData = q.shuffledOpts[index];
            
            if (optData.c) {
                el.classList.add('correct');
            } else if (el === selectedEl && !optData.c) {
                el.classList.add('wrong');
            } else {
                el.classList.add('faded');
            }
        });

        const expBox = document.getElementById('explanation-box');
        
        if (selectedOpt.c) {
            score++;
            expBox.innerHTML = `<span class="status-title" style="color:var(--correct);">✅ Correct!</span><p>${q.exp}</p>`;
            expBox.style.borderLeftColor = 'var(--correct)';
            userHistory.push({ q: q.q, status: 'correct', userA: selectedOpt.t, correctA: correctText, exp: q.exp });
        } else {
            expBox.innerHTML = `<span class="status-title" style="color:var(--wrong);">❌ Incorrect.</span><p>${q.exp}</p>`;
            expBox.style.borderLeftColor = 'var(--wrong)';
            userHistory.push({ q: q.q, status: 'wrong', userA: selectedOpt.t, correctA: correctText, exp: q.exp });
        }
        
        expBox.style.display = 'block';
        document.getElementById('btn-skip').style.display = 'none';
        
        const btnNext = document.getElementById('btn-next');
        btnNext.style.display = 'block';
        btnNext.innerText = (currentIdx === questions.length - 1) ? 'Finish Exam' : 'Next Question';
        
        // Update score display immediately
        document.getElementById('score-text').innerText = `Score: ${score}`;
    }

    function skipQuestion() {
        if (answered) return;
        answered = true;

        const q = questions[currentIdx];
        const allOptionElements = document.querySelectorAll('.option-item');
        const correctText = q.opts.find(o => o.c).t;

        allOptionElements.forEach((el, index) => {
            el.classList.add('disabled');
            if (q.shuffledOpts[index].c) {
                el.classList.add('correct');
            } else {
                el.classList.add('faded');
            }
        });

        const expBox = document.getElementById('explanation-box');
        expBox.innerHTML = `<span class="status-title" style="color:var(--skipped);">⚠️ Skipped.</span><p><strong>Correct Answer:</strong> ${q.exp}</p>`;
        expBox.style.borderLeftColor = 'var(--skipped)';
        expBox.style.display = 'block';

        userHistory.push({ q: q.q, status: 'skipped', userA: '(Skipped)', correctA: correctText, exp: q.exp });

        document.getElementById('btn-skip').style.display = 'none';
        const btnNext = document.getElementById('btn-next');
        btnNext.style.display = 'block';
        btnNext.innerText = (currentIdx === questions.length - 1) ? 'Finish Exam' : 'Next Question';
    }

    function nextQuestion() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            loadQuestion();
        } else {
            buildSummary();
            showScreen('screen-results');
        }
    }

    function buildSummary() {
        const percent = Math.round((score / questions.length) * 100);
        document.getElementById('final-score').innerText = `${score} / ${questions.length} (${percent}%)`;

        const sumList = document.getElementById('summary-list');
        sumList.innerHTML = '';

        userHistory.forEach((item, idx) => {
            let color = '';
            let icon = '';
            if (item.status === 'correct') { color = 'var(--correct)'; icon = '✅'; }
            else if (item.status === 'wrong') { color = 'var(--wrong)'; icon = '❌'; }
            else { color = 'var(--skipped)'; icon = '⚠️'; }

            let html = `
                <div class="sum-item ${item.status}">
                    <div class="sum-q">${idx + 1}. ${item.q}</div>
                    <div class="sum-a" style="color: ${color};"><strong>${icon} Your Answer:</strong> ${item.userA}</div>
            `;
            if (item.status !== 'correct') {
                html += `<div class="sum-a" style="color: var(--correct); margin-top: 5px;"><strong>✓ Correct Answer:</strong> ${item.correctA}</div>`;
            }
            html += `</div>`;
            sumList.innerHTML += html;
        });
    }
</script>
